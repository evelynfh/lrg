<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRG Session Log</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf7;
    --ink: #1a1a14;
    --ink-muted: #6b6657;
    --accent: #2d5a27;
    --accent-light: #e8f0e6;
    --accent-hover: #1e3e1b;
    --border: #d4ccb8;
    --border-focus: #2d5a27;
    --danger: #8b2e2e;
    --row-alt: #faf7f0;
    --shadow: 0 2px 8px rgba(26,26,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,26,20,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 28px 40px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-bottom: 3px solid var(--accent);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #f5f0e8;
  }

  header span {
    font-size: 0.75rem;
    color: #9a9480;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Bird silhouette decoration */
  header::after {
    content: '🐦';
    margin-left: auto;
    font-size: 1.4rem;
    opacity: 0.6;
  }

  /* Main layout */
  main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px 60px;
  }

  /* Session header card */
  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }

  .session-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .session-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Form fields */
  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }

  label .required {
    color: var(--accent);
    margin-left: 2px;
  }

  input[type="text"],
  input[type="search"],
  input[type="date"],
  select {
    width: 100%;
    height: 42px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
    box-sizing: border-box;
  }

  input[type="text"]:focus,
  input[type="search"]:focus,
  input[type="date"]:focus,
  select:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
  }
  /* Species entries section */
  .species-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .species-section-header {
    background: var(--ink);
    color: var(--bg);
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .species-section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
  }

  .species-section-header span {
    font-size: 0.7rem;
    color: #9a9480;
    letter-spacing: 0.08em;
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 2.2fr 1.5fr 1fr 1.4fr 1fr 36px;
    gap: 10px;
    padding: 10px 24px;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
  }

  .col-headers span {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* Species rows */
  #species-rows { padding: 12px 24px; }

  .species-row {
    display: grid;
    grid-template-columns: 2.2fr 1.5fr 1fr 1.4fr 1fr 36px;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }

  .species-row:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Searchable species dropdown */
  .species-search-wrap {
    position: relative;
  }

  .species-input {
    font-size: 0.8rem;
  }

  .species-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
  }

  .species-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border-focus);
    border-radius: 3px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }

  .species-dropdown.open { display: block; }

  .species-option {
    padding: 8px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .species-option:last-child { border-bottom: none; }
  .species-option:hover, .species-option.highlighted {
    background: var(--accent-light);
    color: var(--accent);
  }

  .species-option .match { font-weight: 600; color: var(--accent); }

  .no-results {
    padding: 10px 12px;
    font-size: 0.78rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  /* Row inputs (number spinners) */
  .row-input {
    font-size: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .row-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
  }

  .age-toggle {
    display: flex;
    gap: 4px;
  }

  .age-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .age-btn:hover { background: var(--accent-light); color: var(--accent); }

  .age-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .method-input {
    font-size: 0.8rem;
  }

  .method-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
  }


  input[type="number"].row-input {
    -moz-appearance: textfield;
  }
  input[type="number"].row-input::-webkit-inner-spin-button { display: none; }

  .num-wrap {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 2px;
  }

  .num-input {
    text-align: center;
    padding: 4px 6px;
  }

  .num-btn {
    background: var(--accent-light);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--accent);
    font-size: 0.55rem;
    line-height: 1;
    padding: 3px 0;
    cursor: pointer;
    transition: background 0.1s;
    width: 100%;
  }

  .num-btn:hover { background: var(--border); }

  /* Remove row button */
  .remove-row {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--ink-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    line-height: 1;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .remove-row:hover {
    background: #fde8e8;
    color: var(--danger);
    border-color: var(--danger);
  }

  /* Add row button */
  .add-row-wrap {
    padding: 16px 24px;
    border-top: 1px dashed var(--border);
  }

  .add-row-btn {
    background: none;
    border: 1px dashed var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .add-row-btn:hover { background: var(--accent-light); }

  /* Notes */
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    background: var(--surface);
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.12);
  }

  /* Submit */
  .submit-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .submit-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--ink-muted); cursor: not-allowed; }

  #status-msg {
    font-size: 0.78rem;
    letter-spacing: 0.04em;
  }

  @media (max-width: 600px) {

    header { padding: 18px 20px; }
    header h1 { font-size: 1.3rem; }
    main { margin: 16px auto; padding: 0 12px 40px; }
    .session-card { padding: 20px 16px; margin-bottom: 20px; }
    .session-grid { grid-template-columns: 1fr; }
    .col-headers { display: none; }
    #species-rows { padding: 8px 12px; }

    /* Each entry: every wrapper becomes a flex row spanning full width.
       Label from ::before (fixed 80px), input fills remainder. */
    .species-row {
      display: flex !important;
      flex-direction: column;
      gap: 10px;
      padding: 14px 0;
      border-bottom: 2px solid var(--border);
    }

    /* All five wrappers: flex row, full width */
    .species-row > .species-search-wrap,
    .species-row > .age-toggle,
    .species-row > .num-wrap,
    .species-row > .method-wrap,
    .species-row > .proc-wrap {
      display: flex !important;
      flex-direction: row !important;
      align-items: center;
      width: 100%;
      gap: 0;
    }

    /* ::before label: fixed 80px, no shrink */
    .species-row > .species-search-wrap::before,
    .species-row > .age-toggle::before,
    .species-row > .num-wrap::before,
    .species-row > .method-wrap::before,
    .species-row > .proc-wrap::before {
      display: block;
      width: 80px;
      min-width: 80px;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .species-row > .species-search-wrap::before { content: 'Species'; }
    .species-row > .age-toggle::before          { content: 'Age'; }
    .species-row > .num-wrap::before            { content: 'Extracted'; }
    .species-row > .method-wrap::before         { content: 'Method'; }
    .species-row > .proc-wrap::before           { content: 'Processed'; }

    /* 16px minimum on all inputs to prevent iOS auto-zoom on focus */
    input[type="text"],
    input[type="search"],
    input[type="date"],
    input[type="number"],
    select {
      font-size: 1rem !important;
    }

    /* Species input: fill remaining space after 80px label */
    .species-row > .species-search-wrap > .species-input {
      flex: 1;
      min-width: 0;
      width: 0 !important;
      padding: 10px;
      font-size: 1rem;
    }
    .species-row > .species-search-wrap > .species-dropdown {
      position: absolute;
    }

    /* Method input: same */
    .species-row > .method-wrap > .method-input {
      flex: 1;
      min-width: 0;
      width: 0 !important;
      padding: 10px;
      font-size: 1rem;
    }
    .species-row > .method-wrap > .species-dropdown {
      position: absolute;
    }

    /* Age buttons: fill remaining space as a flex pair */
    .age-btn {
      flex: 1;
      padding: 7px 4px;
      font-size: 0.72rem;
    }
    .age-btn + .age-btn { margin-left: 4px; }

    /* Num wrap: buttons fixed, input fills middle */
    .num-btn {
      width: 36px !important;
      height: 36px;
      flex-shrink: 0 !important;
      font-size: 0.85rem;
      border-radius: 3px;
    }
    .num-input {
      flex: 1 !important;
      min-width: 0;
      width: 0 !important;
      text-align: center;
      padding: 8px 4px;
      font-size: 1rem;
      margin: 0 4px;
    }

    /* Flip spinner buttons on mobile: decrease left, increase right */
    .num-wrap .num-btn:first-child,
    .proc-wrap .num-btn:first-child { order: 3; }
    .num-wrap .num-input,
    .proc-wrap .num-input           { order: 2; }
    .num-wrap .num-btn:last-child,
    .proc-wrap .num-btn:last-child  { order: 1; }

    .remove-row {
      width: 100%;
      height: 40px;
      font-size: 0.78rem;
      font-family: 'IBM Plex Mono', monospace;
      border-radius: 3px;
    }
    .remove-row::after { content: '\00a0 Remove entry'; }

    .add-row-wrap { padding: 12px; }
    .add-row-btn { width: 100%; justify-content: center; padding: 12px; font-size: 0.85rem; }
    .submit-btn { width: 100%; padding: 16px; font-size: 0.9rem; }
    .submit-row { flex-direction: column; align-items: stretch; }
  }

  .status-ok { color: var(--accent); }
  .status-err { color: var(--danger); }

  /* Notes card */
  .notes-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .notes-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    margin-bottom: 16px;
  }

  /* Config notice */
  .config-notice {
    background: #fff8e6;
    border: 1px solid #e8d88a;
    border-left: 3px solid #c9a800;
    border-radius: 3px;
    padding: 14px 18px;
    margin-bottom: 28px;
    font-size: 0.78rem;
    color: #6b5700;
    line-height: 1.6;
  }

  .config-notice strong { color: #4a3c00; }
  .config-notice code {
    background: #f0e8c0;
    padding: 1px 5px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>

<header>
  <h1>LRG Session Log</h1>
</header>

<main>

  <!-- Session Details -->
  <div class="session-card">
    <h2>Session Details</h2>
    <div class="session-grid">
      <div>
        <label>Trainee Name <span class="required">*</span></label>
        <div class="species-search-wrap">
          <input type="text" id="trainee-name" class="species-input"
                 placeholder="Type to search or add name"
                 autocomplete="off"
                 data-is-new="false"
                 oninput="filterTrainees(this.value)"
                 onkeydown="handleTraineeKey(event)"
                 onblur="delayCloseTrainee()"
                 onfocus="filterTrainees(this.value)">
          <div class="species-dropdown" id="dd-trainee"></div>
        </div>
      </div>
      <div>
        <label>Session Date</label>
        <input type="date" id="session-date">
      </div>
    </div>
  </div>

  <!-- Species Entries -->
  <div class="species-section">
    <div class="species-section-header">
      <h2>Species Recorded</h2>
      <span>Add one row per species and age class</span>
    </div>

    <div class="col-headers">
      <span>Species</span>
      <span>Age</span>
      <span>Extracted</span>
      <span>Method</span>
      <span>Processed</span>
      <span></span>
    </div>

    <div id="species-rows"></div>

    <div class="add-row-wrap">
      <button class="add-row-btn" onclick="addRow()">
        <span>+</span> Add species
      </button>
    </div>
  </div>

  <!-- Submit -->
  <div class="submit-row">
    <button class="submit-btn" id="submit-btn" onclick="submitForm()">Submit Session</button>
    <span id="status-msg"></span>
  </div>

</main>

// Row management

let rowCount = 0;

function addRow() {
  rowCount++;
  const id = rowCount;
  const container = document.getElementById('species-rows');

  const row = document.createElement('div');
  row.className = 'species-row';
  row.id = `row-${id}`;
  row.innerHTML = `
    <div class="species-search-wrap">
      <input class="species-input" type="text"
             placeholder="Type to search"
             autocomplete="off"
             oninput="filterSpecies(${id}, this.value)"
             onkeydown="handleKey(event, ${id})"
             onblur="delayClose(${id})"
             onfocus="filterSpecies(${id}, this.value)"
             data-selected=""
             data-write-in="false">
      <div class="species-dropdown" id="dd-${id}"></div>
    </div>

    <div class="age-toggle" id="age-${id}">
      <button type="button" class="age-btn" onclick="selectAge(${id}, 'Juv/Adult', this)">Juv/Adult</button>
      <button type="button" class="age-btn" onclick="selectAge(${id}, 'Pullus', this)">Pullus</button>
    </div>

    <div class="num-wrap">
      <button type="button" class="num-btn" onmousedown="changeNum(${id}, 1)">▲</button>
      <input type="number" class="row-input num-input" id="num-${id}"
             min="0" value="0" oninput="sanitiseNum(this)">
      <button type="button" class="num-btn" onmousedown="changeNum(${id}, -1)">▼</button>
    </div>

    <div class="species-search-wrap method-wrap" id="method-wrap-${id}">
      <input class="method-input" type="text"
             placeholder="Type or search"
             autocomplete="off"
             oninput="filterMethod(${id}, this.value)"
             onkeydown="handleMethodKey(event, ${id})"
             onblur="delayCloseMethod(${id})"
             onfocus="filterMethod(${id}, this.value)"
             data-selected=""
             data-write-in="false">
      <div class="species-dropdown" id="dd-method-${id}"></div>
    </div>

    <div class="num-wrap proc-wrap">
      <button type="button" class="num-btn" onmousedown="changeProc(${id}, 1)">▲</button>
      <input type="number" class="row-input num-input" id="proc-${id}"
             min="0" value="0" oninput="sanitiseProc(this)">
      <button type="button" class="num-btn" onmousedown="changeProc(${id}, -1)">▼</button>

    <button class="remove-row" onclick="removeRow(${id})" title="Remove row">×</button>

function removeRow(id) {
  const row = document.getElementById(`row-${id}`);
  if (row) row.remove();
}

// Searchable species dropdown
// ─────────────────────────────────────────────
let highlightIndex = {};

function filterSpecies(id, query) {
  const dd = document.getElementById(`dd-${id}`);
  const q = query.trim().toLowerCase();
  highlightIndex[id] = 0;

  if (!q) { dd.innerHTML = ''; dd.classList.remove('open'); return; }

  const matches = SPECIES_LIST.filter(s =>
    s.name.toLowerCase().includes(q) ||
    (s.code && s.code.toLowerCase().includes(q))
  ).slice(0, 40);

  // "Use as written" option if typed value isn't an exact name match
  // and nothing has been formally selected yet
  const input = document.querySelector(`#row-${id} .species-input`);
  const alreadySelected = input && input.dataset.selected === query.trim();
  const exactMatch = alreadySelected || SPECIES_LIST.some(s => s.name.toLowerCase() === q);
  const writeIn = !exactMatch
    ? `<div class="species-option write-in-option"
         onmousedown="selectSpecies(${id}, '${query.trim().replace(/'/g,"\\'")}', true)">
         <span style="color:var(--ink-muted);font-size:0.72rem;">Use as written: </span>${query.trim()}
       </div>` : '';

  if (!matches.length && !writeIn) {
    dd.innerHTML = `<div class="no-results">No species found</div>`;
    dd.classList.add('open');
    return;
  }

  dd.innerHTML = matches.map((s, i) => {
    const nameHl = s.name.replace(new RegExp(`(${escapeRe(q)})`, 'gi'), '<span class="match">$1</span>');
    const codeDisplay = s.code
      ? `<span style="color:var(--ink-muted);font-size:0.72rem;margin-left:6px;">${s.code.replace(new RegExp(`(${escapeRe(q.toUpperCase())})`, 'g'), '<span class="match">$1</span>')}</span>`
      : '';
    return `<div class="species-option${i === 0 && !writeIn ? ' highlighted' : ''}"
      onmousedown="selectSpecies(${id}, '${s.name.replace(/'/g,"\\'")}', false)">
      ${nameHl}${codeDisplay}
    </div>`;
  }).join('') + writeIn;

  dd.classList.add('open');
}

function selectSpecies(id, name, isWriteIn) {
  const input = document.querySelector(`#row-${id} .species-input`);
  input.value = name;
  input.dataset.selected = name;
  input.dataset.writeIn = isWriteIn ? 'true' : 'false';
  input.style.borderColor = '';
  const dd = document.getElementById(`dd-${id}`);
  dd.classList.remove('open');
  dd.innerHTML = '';
}

function delayClose(id) {
  setTimeout(() => {
    const dd = document.getElementById(`dd-${id}`);
    if (dd) { dd.classList.remove('open'); }
  }, 150);
}

function handleKey(e, id) {
  const dd = document.getElementById(`dd-${id}`);
  const items = dd.querySelectorAll('.species-option');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightIndex[id] = Math.min((highlightIndex[id] || 0) + 1, items.length - 1);
    updateHighlight(id, items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightIndex[id] = Math.max((highlightIndex[id] || 0) - 1, 0);
    updateHighlight(id, items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const hi = items[highlightIndex[id] || 0];
    if (hi) hi.dispatchEvent(new MouseEvent('mousedown'));
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function updateHighlight(id, items) {
  items.forEach((el, i) => {
    el.classList.toggle('highlighted', i === highlightIndex[id]);
  });
  items[highlightIndex[id]]?.scrollIntoView({ block: 'nearest' });
}

function selectAge(id, value, btn) {
  document.querySelectorAll(`#age-${id} .age-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`age-${id}`).style.outline = '';
}

function clearPlaceholder(el) {
  el.classList.add('selected');
}

function handleMethodChange(id, value) {} // legacy stub — no longer used

const METHOD_DEFAULTS = ["Mist net", "Whoosh net", "Hand net", "Spring trap", "Potter trap", "Nest", "Nest box"];
let methodList = [...METHOD_DEFAULTS];

function fetchMethods() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') return;
  fetch(SCRIPT_URL + '?action=getMethods')
    .then(r => r.json())
    .then(data => {
      if (Array.isArray(data.methods)) {
        const combined = [...new Set([...METHOD_DEFAULTS, ...data.methods])];
        methodList = combined.sort();
      }
    })
    .catch(() => {});
}

function filterMethod(id, query) {
  const dd = document.getElementById(`dd-method-${id}`);
  const q = query.trim().toLowerCase();

  const matches = q ? methodList.filter(m => m.toLowerCase().includes(q)) : methodList;
  const methodInput = document.querySelector(`#method-wrap-${id} .method-input`);
  const alreadySelected = methodInput && methodInput.dataset.selected === query.trim();
  const exactMatch = alreadySelected || methodList.some(m => m.toLowerCase() === q);
  const writeIn = q && !exactMatch
    ? `<div class="species-option write-in-option"
         onmousedown="selectMethod(${id}, '${query.trim().replace(/'/g,"\\'")}', true)">
         <span style="color:var(--ink-muted);font-size:0.72rem;">Use as written: </span>${query.trim()}
       </div>` : '';

  dd.innerHTML = matches.map((m, i) => {
    const hl = q ? m.replace(new RegExp(`(${escapeRe(q)})`, 'gi'), '<span class="match">$1</span>') : m;
    return `<div class="species-option${i === 0 && !writeIn ? ' highlighted' : ''}"
      onmousedown="selectMethod(${id}, '${m.replace(/'/g,"\\'")}', false)">${hl}</div>`;
  }).join('') + writeIn;

  dd.classList.add('open');
}

function selectMethod(id, value, isWriteIn) {
  const input = document.querySelector(`#method-wrap-${id} .method-input`);
  input.value = value;
  input.dataset.selected = value;
  input.dataset.writeIn = isWriteIn ? 'true' : 'false';
  input.style.borderColor = '';
  // Add write-ins to the local list immediately so they appear in future dropdowns
  if (isWriteIn && !methodList.includes(value)) {
    methodList = [...methodList, value].sort();
  }
  const dd = document.getElementById(`dd-method-${id}`);
  dd.classList.remove('open');
  dd.innerHTML = '';
}

function delayCloseMethod(id) {
  setTimeout(() => {
    const dd = document.getElementById(`dd-method-${id}`);
    if (dd) dd.classList.remove('open');
  }, 150);
}

function handleMethodKey(e, id) {
  const dd = document.getElementById(`dd-method-${id}`);
  const items = dd.querySelectorAll('.species-option');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const cur = parseInt(dd.dataset.hi || 0);
    dd.dataset.hi = Math.min(cur + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dd.dataset.hi = Math.max(parseInt(dd.dataset.hi || 0) - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    items[parseInt(dd.dataset.hi || 0)]?.dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    dd.classList.remove('open'); return;
  }
  items.forEach((el, i) => el.classList.toggle('highlighted', i === parseInt(dd.dataset.hi || 0)));
  items[parseInt(dd.dataset.hi || 0)]?.scrollIntoView({ block: 'nearest' });
}

function sanitiseNum(input) {
  const val = parseInt(input.value);
  if (isNaN(val) || val < 0) input.value = 0;
  else input.value = val;
  const row = input.closest('.species-row');
  row.querySelector('.num-wrap').style.outline = '';
  row.querySelector('.proc-wrap').style.outline = '';
}

function sanitiseProc(input) {
  const val = parseInt(input.value);
  if (isNaN(val) || val < 0) input.value = 0;
  else input.value = val;
  const row = input.closest('.species-row');
  row.querySelector('.num-wrap').style.outline = '';
  row.querySelector('.proc-wrap').style.outline = '';
}

// ─────────────────────────────────────────────
// Trainee name list (fetched from Google Sheets)
// ─────────────────────────────────────────────
let traineeList = [];
let traineeHighlight = 0;

function fetchTrainees() {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL') return;
  fetch(SCRIPT_URL + '?action=getTrainees')
    .then(r => r.json())
    .then(data => { if (Array.isArray(data.trainees)) traineeList = data.trainees.sort(); })
    .catch(() => {}); // silently fail — form still works for write-in
}

function filterTrainees(query) {
  const dd = document.getElementById('dd-trainee');
  const q = query.trim().toLowerCase();
  traineeHighlight = 0;

  if (!q) { dd.innerHTML = ''; dd.classList.remove('open'); return; }

  const matches = traineeList.filter(n => n.toLowerCase().includes(q)).slice(0, 30);

  // Always show a "New trainee" option if the typed name isn't an exact match
  const exactMatch = traineeList.some(n => n.toLowerCase() === q);
  const newOption = !exactMatch
    ? `<div class="species-option new-trainee-option"
         onmousedown="selectTrainee('${query.trim().replace(/'/g,"\\'")}', true)">
         <span style="color:var(--ink-muted);font-size:0.72rem;">Add new: </span>${query.trim()}
       </div>` : '';

  if (!matches.length && exactMatch) {
    dd.innerHTML = ''; dd.classList.remove('open'); return;
  }

  dd.innerHTML = matches.map((n, i) => {
    const hl = n.replace(new RegExp(`(${escapeRe(q)})`, 'gi'), '<span class="match">$1</span>');
    return `<div class="species-option${i === 0 && !newOption ? ' highlighted' : ''}"
      onmousedown="selectTrainee('${n.replace(/'/g,"\\'")}', false)">${hl}</div>`;
  }).join('') + newOption;

  dd.classList.add('open');
}

function selectTrainee(name, isNew) {
  const input = document.getElementById('trainee-name');
  input.value = name;
  input.dataset.isNew = isNew ? 'true' : 'false';
  const dd = document.getElementById('dd-trainee');
  dd.classList.remove('open');
  dd.innerHTML = '';
}

function delayCloseTrainee() {
  setTimeout(() => {
    const dd = document.getElementById('dd-trainee');
    if (dd) dd.classList.remove('open');
  }, 150);
}

function handleTraineeKey(e) {
  const dd = document.getElementById('dd-trainee');
  const items = dd.querySelectorAll('.species-option');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    traineeHighlight = Math.min(traineeHighlight + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    traineeHighlight = Math.max(traineeHighlight - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    items[traineeHighlight]?.dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    dd.classList.remove('open'); return;
  }
  items.forEach((el, i) => el.classList.toggle('highlighted', i === traineeHighlight));
  items[traineeHighlight]?.scrollIntoView({ block: 'nearest' });
}

// ─────────────────────────────────────────────
// Number spinner
// ─────────────────────────────────────────────
function changeNum(id, delta) {
  const input = document.getElementById(`num-${id}`);
  const current = parseInt(input.value) || 0;
  input.value = Math.max(0, current + delta);
  document.querySelector(`#row-${id} .num-wrap`).style.outline = '';
  document.querySelector(`#row-${id} .proc-wrap`).style.outline = '';
}

function changeProc(id, delta) {
  const input = document.getElementById(`proc-${id}`);
  const current = parseInt(input.value) || 0;
  input.value = Math.max(0, current + delta);
  document.querySelector(`#row-${id} .num-wrap`).style.outline = '';
  document.querySelector(`#row-${id} .proc-wrap`).style.outline = '';
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ─────────────────────────────────────────────
// Form submission
// ─────────────────────────────────────────────
function submitForm() {
  const name = document.getElementById('trainee-name').value.trim();
  const date = document.getElementById('session-date').value;

  if (!name) { showStatus('Please enter trainee name.', false); return; }

  const rows = document.querySelectorAll('.species-row');
  if (!rows.length) { showStatus('Please add at least one species.', false); return; }

  const entries = [];
  let valid = true;

  rows.forEach(row => {
    const id = row.id.replace('row-', '');
    const species = row.querySelector('.species-input').dataset.selected;
    const speciesWriteIn = species && !SPECIES_LIST.some(s => s.name === species) ? 'Yes' : 'No';
    const ageBtn = document.querySelector(`#age-${id} .age-btn.active`);
    const age = ageBtn ? ageBtn.textContent : '';
    const num = Math.max(0, parseInt(document.getElementById(`num-${id}`).value) || 0);
    const methodInput = document.querySelector(`#method-wrap-${id} .method-input`);
    const method = methodInput.dataset.selected || '';
    const methodWriteIn = method && !METHOD_DEFAULTS.includes(method) ? 'Yes' : 'No';
    const processed = Math.max(0, parseInt(document.getElementById(`proc-${id}`).value) || 0);

    if (!species) {
      row.querySelector('.species-input').style.borderColor = '#8b2e2e';
      valid = false;
    }
    if (!age) {
      row.querySelector('.age-toggle').style.outline = '2px solid #8b2e2e';
      valid = false;
    }
    if (!method) {
      methodInput.style.borderColor = '#8b2e2e';
      valid = false;
    }

    if (num === 0 && processed === 0) {
      row.querySelector('.num-wrap').style.outline = '2px solid #8b2e2e';
      row.querySelector('.proc-wrap').style.outline = '2px solid #8b2e2e';
      valid = false;
    } else {
      row.querySelector('.num-wrap').style.outline = '';
      row.querySelector('.proc-wrap').style.outline = '';
    }

    entries.push({ species, speciesWriteIn, age, num, method, methodWriteIn, processed });
  });

  if (!valid) { showStatus('Please fill in species, age, and catching method for all rows, and enter at least one extracted or processed bird.', false); return; }

  const payload = {
    trainee: name,
    isNewTrainee: document.getElementById('trainee-name').dataset.isNew === 'true',
    date,
    entries
  };
  // Collect any write-in methods not in the default list to add to the Methods sheet
  const newMethods = [...new Set(
    entries
      .filter(e => e.methodWriteIn === 'Yes' && e.method)
      .map(e => e.method)
  )];
  if (newMethods.length) payload.newMethods = newMethods;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('Submitting…', null);

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    if (data.result === 'success') {
      showStatus(`✓ Session submitted (${entries.length} species logged).`, true);
      resetForm();
    } else {
      showStatus('Submission failed: ' + (data.error || 'unknown error'), false);
    }
  })
  .catch(() => {
    showStatus('Network error — check your connection or Script URL.', false);
  })
  .finally(() => { btn.disabled = false; });
}

function resetForm() {
  document.getElementById('trainee-name').value = '';
  document.getElementById('session-date').value = '';
  document.getElementById('species-rows').innerHTML = '';
  rowCount = 0;
  addRow();
}

function showStatus(msg, ok) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = ok === true ? 'status-ok' : ok === false ? 'status-err' : '';
}

// Initialise with one empty row
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  const dateInput = document.getElementById('session-date');
  dateInput.max = today;
  dateInput.valueAsDate = new Date();
  fetchTrainees();
  fetchMethods();
  addRow();
});
</script>
